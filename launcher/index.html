<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self';">
  <title>onecodex Launcher</title>
  <link rel="stylesheet" href="launcher.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="eyebrow">onecodex Launcher</div>
      <h1>配置 API 并启动本地服务</h1>
      <p class="intro">桌面应用只负责保存 API 配置、管理本地服务，并引导浏览器打开 Web 界面。</p>

      <div class="status-card">
        <div>
          <div class="status-label">服务状态</div>
          <div class="status-value" id="serviceState">检查中</div>
        </div>
        <div>
          <div class="status-label">浏览器入口</div>
          <div class="status-link" id="browserUrl">-</div>
        </div>
      </div>

      <label class="field">
        <span>OpenAI API Key</span>
        <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false">
        <small id="apiKeyHint"></small>
      </label>

      <label class="field">
        <span>默认模型</span>
        <input id="model" type="text" placeholder="留空则使用 codex 默认模型" autocomplete="off" spellcheck="false">
      </label>

      <div class="actions">
        <button id="saveBtn" class="primary" type="button">保存并启动</button>
        <button id="openBtn" type="button">打开浏览器</button>
        <button id="startBtn" type="button">启动服务</button>
        <button id="stopBtn" type="button">停止服务</button>
      </div>

      <p class="message" id="message"></p>
    </section>
  </main>
  <script src="launcher.js"></script>
</body>
</html>
